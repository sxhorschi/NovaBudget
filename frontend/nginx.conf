server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Resolve backend at runtime (not startup) so nginx doesn't crash if backend is down
    resolver 127.0.0.11 valid=30s;
    set $backend_upstream http://backend:8000;

    # API reverse proxy — pass to backend container
    location /api/ {
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        client_max_body_size 20m;
    }

    # Health endpoint from backend
    location /health {
        proxy_pass $backend_upstream;
    }

    # Static assets with long cache (Vite hashes filenames)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — everything else serves index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
