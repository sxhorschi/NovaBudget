services:
  db:
    image: postgres:16
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: budget
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d budget"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/budget
      DEBUG: ${DEBUG:-true}
      AUTH_DISABLED: ${AUTH_DISABLED:-true}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@localhost}
      ADMIN_NAME: ${ADMIN_NAME:-Administrator}
      AZURE_CLIENT_ID: ${VITE_AZURE_CLIENT_ID:-}
      AZURE_TENANT_ID: ${VITE_AZURE_TENANT_ID:-}
      AZURE_CLIENT_SECRET: ${AZURE_CLIENT_SECRET:-}
      MAIL_SENDER_EMAIL: ${MAIL_SENDER_EMAIL:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-'["http://localhost:5173"]'}
      URL_PREFIX: ${URL_PREFIX:-}
    volumes:
      - ./backend/app:/app/app
      - ./backend/data:/app/data
      - ./backend/scripts:/app/scripts
      - ./backups:/backups
    depends_on:
      db:
        condition: service_healthy

  backup:
    image: postgres:16
    restart: unless-stopped
    environment:
      PGPASSWORD: postgres
      BACKUP_INTERVAL_HOURS: ${BACKUP_INTERVAL_HOURS:-24}
      BACKUP_KEEP: ${BACKUP_KEEP:-30}
    volumes:
      - ./backups:/backups
    depends_on:
      db:
        condition: service_healthy
    entrypoint: >
      sh -c "
        echo '[backup] Service started. First backup in 1 hour, then every $${BACKUP_INTERVAL_HOURS}h.';
        sleep 3600;
        while true; do
          FILE=/backups/scheduled_$$(date +%Y%m%d_%H%M%S).sql;
          pg_dump -h db -U postgres budget > $$FILE && echo \"[backup] Done: $$FILE ($$(du -sh $$FILE | cut -f1))\" || echo '[backup] ERROR: dump failed';
          ls -t /backups/scheduled_*.sql 2>/dev/null | tail -n +$$(( BACKUP_KEEP + 1 )) | xargs -r rm --;
          sleep $$(( BACKUP_INTERVAL_HOURS * 3600 ));
        done
      "

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_AZURE_CLIENT_ID: ${VITE_AZURE_CLIENT_ID:-}
        VITE_AZURE_TENANT_ID: ${VITE_AZURE_TENANT_ID:-}
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000/api/v1}
        VITE_AUTH_DISABLED: ${VITE_AUTH_DISABLED:-false}
        VITE_URL_PREFIX: ${VITE_URL_PREFIX:-}
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    depends_on:
      - backend

