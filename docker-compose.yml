services:
  db:
    image: postgres:16
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: budget
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d budget"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/budget
      DEBUG: ${DEBUG:-true}
      AUTH_DISABLED: ${AUTH_DISABLED:-true}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@localhost}
      ADMIN_NAME: ${ADMIN_NAME:-Administrator}
      AZURE_CLIENT_ID: ${VITE_AZURE_CLIENT_ID:-}
      AZURE_TENANT_ID: ${VITE_AZURE_TENANT_ID:-}
      AZURE_CLIENT_SECRET: ${AZURE_CLIENT_SECRET:-}
      MAIL_SENDER_EMAIL: ${MAIL_SENDER_EMAIL:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-'["http://localhost:5173"]'}
      URL_PREFIX: ${URL_PREFIX:-}
    volumes:
      - ./backend/app:/app/app
      - ./backend/data:/app/data
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_AZURE_CLIENT_ID: ${VITE_AZURE_CLIENT_ID:-}
        VITE_AZURE_TENANT_ID: ${VITE_AZURE_TENANT_ID:-}
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000/api/v1}
        VITE_AUTH_DISABLED: ${VITE_AUTH_DISABLED:-false}
        VITE_URL_PREFIX: ${VITE_URL_PREFIX:-}
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    depends_on:
      - backend

volumes:
  pgdata:
